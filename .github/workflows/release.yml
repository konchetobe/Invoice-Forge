name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
        contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Dependencies
        run: composer update --no-dev --optimize-autoloader

      - name: Strip vendor bloat
        run: |
          # Remove docs, tests, and other non-runtime files from vendor packages
          find vendor -type d \( -name 'test' -o -name 'tests' -o -name 'Tests' \
            -o -name 'doc' -o -name 'docs' -o -name 'examples' -o -name 'demo' \
            -o -name '.git' -o -name '.github' \) -exec rm -rf {} + 2>/dev/null || true
          find vendor -type f \( -name '*.md' -o -name 'CHANGELOG*' -o -name 'UPGRADING*' \
            -o -name 'LICENSE*' -o -name 'CONTRIBUTING*' -o -name '.gitignore' \
            -o -name '.gitattributes' -o -name '.editorconfig' -o -name 'phpunit.xml*' \
            -o -name 'phpstan.neon*' -o -name '.php-cs-fixer*' -o -name 'Makefile' \
            -o -name '.travis.yml' -o -name 'appveyor.yml' \) -delete 2>/dev/null || true

      - name: Create Plugin ZIP
        run: |
          # Create a temp directory named after the plugin slug
          mkdir -p /tmp/invoiceforge
          # Copy all files into the plugin slug folder (excluding dev and git files)
          rsync -avq . /tmp/invoiceforge \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'tests' \
            --exclude 'phpunit.xml' \
            --exclude 'phpcs.xml' \
            --exclude 'phpstan.neon' \
            --exclude 'node_modules' \
            --exclude 'composer.phar' \
            --exclude 'composer.lock' \
            --exclude '.claude' \
            --exclude '.planning' \
            --exclude '.abacus.donotdelete'

          # Zip the folder creating invoiceforge.zip
          cd /tmp
          zip -rq invoiceforge-plugin-installable.zip invoiceforge
          echo "ZIP size: $(du -sh invoiceforge-plugin-installable.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/invoiceforge-plugin-installable.zip
          generate_release_notes: true
